version: 1
kind: references-index

# - Use null for empty field values.
# - References is a required object.
# - Each key inside references is a stable reference ID.
# - Each reference contains only a short index card.
# - Meta contains stable administrative fields:
#   - name: human-readable reference name.
#   - status: one of [not_researched, docs_reviewed, hands_on].
#   - document: must match the reference ID: {id}.md.
#   - link: primary reference URL.
# - Compare is a quick product-coverage signal filled after research:
#   - supported_interfaces: array of [cli, api, web, vscode, macos, windows, linux, android, iphone].
#   - providers: supported providers, tools, or data sources relevant to usage/spending tracking.
#   - capabilities: verified feature tags only; use [] when none confirmed. Closed vocabulary:
#     - usage — current or accumulated consumption (tokens, requests, sessions, messages).
#     - limits — subscription or plan quota cap / progress (% used, plan allowance).
#     - session_limits — billing or session window caps (e.g. Claude 5h block), not full plan quota.
#     - reset — quota window reset time or countdown.
#     - credits — prepaid or API credit balance, separate from subscription quota.
#     - cost — estimated or actual monetary cost.
#     - burn_rate — consumption velocity (tokens/min, $/hour).
#     - forecast — predicted limit-hit time or projected exhaustion.
#     - usage_history — historical reports (daily, weekly, monthly, session archives).
#     List the union of what the tool exposes anywhere; provider-specific gaps go in summary, not here.
#     At docs_reviewed: from documentation only. At hands_on: prefer verified runtime behavior.
#   - notifications: true/false when verified, null when not checked.
#   - hard_stop: true/false when verified, null when not checked. Use for enforced spend/usage stop or limit-control capabilities.
#   - conclusion: final visual research outcome, one of [💎, 👍, 🤷‍♂️, ❓, 👀].
#     💎 ideal; 👍 good; 🤷‍♂️ not relevant; ❓ unclear; 👀 needs more research.
# - Summary is a short human-readable description (positioning, data source, relevance vs ai-usage-mit).
#   Do not repeat capability tags; use summary for scope caveats (e.g. "Claude only", "Codex: usage only").
# - Details, comparison, sources and custom sections are maintained in document.

references:
  ccusage:
    meta:
      name: ccusage
      status: hands_on
      document: ccusage.md
      link: https://github.com/ryoppippi/ccusage
    compare:
      supported_interfaces: [cli]
      providers: [Claude, Codex, Gemini]
      capabilities: [usage, session_limits, reset, cost, burn_rate, forecast, usage_history]
      notifications: false
      hard_stop: false
      conclusion: 👍
    summary: >
      Open-source CLI tool (MIT, 14,100 stars) that reads local JSONL telemetry from
      Claude Code, Codex, Gemini CLI, and 15+ other tools, generating daily/weekly/monthly
      usage reports. Hands-on confirmed Codex token/cost output and Claude active-block
      projections; Gemini namespace exists but no local Gemini data was available to verify
      cost extraction. Does NOT expose subscription quota or reset countdown for Codex/Gemini.
      High reference relevance — same local-file strategy and multi-tool scope as ai-usage-mit,
      but misses the cross-provider quota/limit core.

  claude-code-usage-monitor:
    meta:
      name: Claude-Code-Usage-Monitor
      status: hands_on
      document: claude-code-usage-monitor.md
      link: https://github.com/Maciek-roboblog/Claude-Code-Usage-Monitor
    compare:
      supported_interfaces: [cli]
      providers: [Claude]
      capabilities: [usage, session_limits, reset, cost, burn_rate, forecast, usage_history]
      notifications: false
      hard_stop: false
      conclusion: 👍
    summary: >
      Open-source real-time terminal monitor (8,300 stars) for Claude Code usage with
      Rich UI, burn-rate tracking, and session limit predictions ("will I hit my limit?").
      Hands-on confirmed Claude cost/reset/forecast output and confirmed that real `~/.codex`
      data produced zero usage/cost/limits. Claude Code only — no Codex, Gemini CLI, or other
      tools. High reference relevance for the Claude Code segment specifically; ai-usage-mit
      differentiates via multi-tool support and polished UI.

  claude-usage:
    meta:
      name: claude-usage (phuryn)
      status: hands_on
      document: claude-usage.md
      link: https://github.com/phuryn/claude-usage
    compare:
      supported_interfaces: [cli, web, vscode]
      providers: [Claude]
      capabilities: [usage, cost, usage_history]
      notifications: false
      hard_stop: false
      conclusion: 👍
    summary: >
      Open-source local web dashboard (~1,600 stars) for Claude Code usage history.
      Localhost:8080 SPA with Chart.js charts, 30s auto-refresh, and VS Code extension.
      README claims a Pro/Max usage progress bar, but it was not found hands-on. Hands-on
      confirmed real Codex JSONL files are enumerated but produce 0 turns/sessions/cost,
      while real Claude data is parsed. Claude Code only; no burn-rate prediction or
      cross-provider limits. Medium reference relevance — same audience, local-first approach,
      and web UI are strengths, but limited to Claude Code and less actively maintained.

  cpa-manager-plus:
    meta:
      name: CPA-Manager-Plus
      status: docs_reviewed
      document: cpa-manager-plus.md
      link: https://github.com/seakee/CPA-Manager-Plus
    compare:
      supported_interfaces: [macos, windows, linux]
      providers: [CLIProxyAPI, Codex]
      capabilities: []
      notifications: null
      hard_stop: null
      conclusion: 👀
    summary: >
      Free MIT-licensed self-hosted ops dashboard (944 stars) tightly coupled to
      CLIProxyAPI. Adds SQLite request ledger, cost/token analytics by model/key/project,
      Codex quota inspection, and plugin ecosystem on top of CPA. Useless without CPA —
      no standalone value. Primary audience: Chinese-speaking self-hosters. Low reference
      relevance unless ai-usage-mit targets the same CPA analytics niche.

  cpa-usage-keeper:
    meta:
      name: CPA Usage Keeper
      status: docs_reviewed
      document: cpa-usage-keeper.md
      link: https://github.com/Willxup/cpa-usage-keeper
    compare:
      supported_interfaces: [api]
      providers: [CLIProxyAPI]
      capabilities: [usage, limits, session_limits, reset, cost, usage_history]
      notifications: null
      hard_stop: null
      conclusion: 👀
    summary: >
      Open-source observability sidecar (MIT, 818 stars) for CLIProxyAPI — not a standalone
      product. Consumes CPA's Redis usage queue into SQLite and serves a built-in React
      dashboard with historical CPA event analytics, pricing/latency diagnostics, credential
      health, and CSV/JSON export. Live CPA/Redis is still required for ingestion, metadata,
      credential quota windows, and reset timing; provider scope is CLIProxyAPI events, not
      direct provider integrations. Very active: 55 releases, v1.12.1 on 2026-06-26.

  llmeter:
    meta:
      name: LLMeter
      status: docs_reviewed
      document: llmeter.md
      link: https://llmeter.app
    compare:
      supported_interfaces: [api, web]
      providers: [OpenAI, Anthropic, DeepSeek, OpenRouter, Mistral, Google AI, Azure OpenAI, AWS Bedrock]
      capabilities: [usage, cost, usage_history]
      notifications: true
      hard_stop: false
      conclusion: 👀
    summary: >
      Open-source multi-provider AI billing dashboard for real API spend, usage trends,
      retention, exports, budget/anomaly alerts, and email/Slack/webhook notifications.
      Billing API integrations cover OpenAI, Anthropic, DeepSeek, OpenRouter, and Mistral;
      Google AI, Azure OpenAI, and AWS Bedrock are documented through SDK wrappers, with
      Google AI marked "coming soon" on the homepage FAQ. No local-file or CLI subscription
      awareness: no Claude Code / Codex / Gemini CLI limits, credits, or reset countdown.
      Low-Medium relevance: different data source and audience; positioning overlap only.

  router-for-me:
    meta:
      name: Router-For.ME
      status: docs_reviewed
      document: router-for-me.md
      link: https://github.com/router-for-me
    compare:
      supported_interfaces: [cli, api]
      providers: [Claude, Codex, Gemini, Grok, Antigravity]
      capabilities: []
      notifications: null
      hard_stop: null
      conclusion: 👀
    summary: >
      Open-source proxy server (CLIProxyAPI, 38,618 stars, v7.2.44 as of 2026-06-28) that
      wraps Claude Code, Codex, Gemini CLI, Grok Build, and Antigravity behind unified
      OpenAI-compatible API endpoints with multi-account load balancing. Focused on
      access/routing, not observability. Usage tracking permanently removed in v6.10.0
      ("chore: remove usage tracking and logging functionality",
      https://github.com/router-for-me/CLIProxyAPI/releases/tag/v6.10.0);
      feature-request issues #3444 and #3481 closed "Not planned" May 2026.
      Low-Medium reference relevance.
